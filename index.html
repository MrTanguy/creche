<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Creche</title>
        <style>

            body{
                margin:0;
                height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                font-family:Arial, sans-serif;
                background:linear-gradient(135deg,#667eea,#764ba2);
            }

            .container{
                background:white;
                padding:40px;
                border-radius:15px;
                box-shadow:0 10px 30px rgba(0,0,0,0.2);
                text-align:center;
                width:320px;
            }

            input{
                width:100%;
                padding:12px;
                font-size:16px;
                border-radius:8px;
                border:1px solid #ccc;
            }

            button{
                margin-top:15px;
                padding:10px 15px;
                border:none;
                border-radius:8px;
                cursor:pointer;
                color:white;
                background:linear-gradient(135deg,#667eea,#764ba2);
            }

            #resultat{
                margin-top:20px;
                font-weight:bold;
            }

            .confirmation{
                margin-top:15px;
            }

            .confirmation button{
                margin:5px;
            }

        </style>
    </head>

    <body>

    <div class="container">

        <h1>Renseigne le ratio m²/enfant</h1>

        <input type="text" id="reponse" placeholder="Tape ta réponse">

        <button id="validation" onclick="verifier()">Valider</button>

        <div id="resultat"></div>
        <div id="confirmation"></div>

    </div>

    <script>

        function verifier(){
            let valeur = document.getElementById("reponse").value;
            let resultat = document.getElementById("resultat");
            let confirmation = document.getElementById("confirmation");
            
            confirmation.innerHTML = "";
            document.getElementById("validation").style.display = 'none';

            if (valeur == "6,89") {

                resultat.textContent = "Bonne réponse ! Mais ta crèche est-elle conforme ? ";
                resultat.style.color = "green";

                confirmation.innerHTML = `
                    <div class="confirmation">
                    <button onclick="gagner()">Oui</button>
                    <button onclick="perdu()">Non</button>
                    </div>
                `;
            } else {
                perdu()
            }
        }

        function gagner(){
            document.getElementById("validation").style.display = 'none';
            document.getElementById("resultat").textContent = "🎉 Félicitation ! Maintenant va équiper ta porte d'entrée…";
            document.getElementById("confirmation").innerHTML = "";
        }

        function perdu(){
            let resultat = document.getElementById("resultat");

            document.getElementById("confirmation").innerHTML = "";
            document.getElementById("validation").style.display = 'inline-block';

            resultat.textContent = "❌ Erreur ! Revise ton référentiel Norma...\nMais tu as gagné un stage à la PMI 😊.";
            resultat.style.color = "red";
        }

        </script>

    </body>
</html>
