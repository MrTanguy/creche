<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mini Jeu</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }

    input {
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-left: 10px;
    }

    #resultat {
      margin-top: 20px;
      font-weight: bold;
      font-size: 20px;
    }
  </style>
</head>
<body>

<h1>Entre la bonne réponse</h1>

<input type="text" id="reponse" placeholder="Tape ta réponse">
<button onclick="verifier()">Valider</button>

<div id="resultat"></div>

<script>
function verifier() {
  let valeur = document.getElementById("reponse").value;

  if (valeur == "6.89") {
    document.getElementById("resultat").textContent = "🎉 Bravo, tu as gagné !";
    document.getElementById("resultat").style.color = "green";
  } else {
    document.getElementById("resultat").textContent = "❌ Mauvaise réponse, tu as perdu.";
    document.getElementById("resultat").style.color = "red";
  }
}
</script>

</body>
</html>
